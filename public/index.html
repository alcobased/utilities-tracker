<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility Readings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Utility Readings</h1>

    <div class="container">
        <h2>Add / Update Readings</h2>
        <form id="reading-form">
            <p>Select a date to define the consumption period.</p>
            <input type="date" id="date-input" required>
            
            <div id="metrics-fields" class="metrics-container">
                <input type="number" step="0.01" id="gas-total-input" placeholder="Total Gas Reading">
                <input type="number" step="0.01" id="gas-hh2-input" placeholder="Household 2 Gas">
                <input type="number" step="0.01" id="electricity-total-input" placeholder="Total Electricity">
                <!-- Add other metric inputs here as needed -->
            </div>

            <button type="submit">Save Readings</button>
        </form>

        <h2>Recorded Readings</h2>
        <table id="readings-table">
            <thead>
                <tr>
                    <th>Period</th>
                    <th>Gas (Total)</th>
                    <th>Gas (HH2)</th>
                    <th>Gas (HH1, Calc.)</th>
                    <th>Electricity</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="readings-body">
                <!-- Data will be populated here -->
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
